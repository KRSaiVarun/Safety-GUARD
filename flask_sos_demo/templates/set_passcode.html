<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Set Passcode</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
      }
      label,
      input {
        display: block;
        margin-bottom: 12px;
        font-size: 1rem;
      }
      button {
        padding: 10px 16px;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Set Emergency Passcode</h1>
    <form method="post">
      <label for="new_passcode">Enter a passcode to stop the alert:</label>
      <input id="new_passcode" name="new_passcode" type="text" required />
      <button type="submit">Continue</button>
    </form>
  </body>
</html>
